{% load staticfiles %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Emergent Emotional Appraisal — Emotion Engine</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-image: url("{% static 'bg_poster.png' %}");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #333;
      font-family: "Arial", "Helvetica", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* Dark overlay for text readability */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.25);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 600px;
    }

    .badge {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #ff6b35;
      margin-bottom: 16px;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: clamp(24px, 6vw, 42px);
      font-weight: 900;
      text-align: center;
      line-height: 1.2;
      margin-bottom: 14px;
      color: #ffffff;
      text-shadow: 3px 3px 6px rgba(0,0,0,0.6), -1px -1px 3px rgba(0,0,0,0.4);
      font-family: Arial Black, sans-serif;
    }

    .tagline {
      font-size: clamp(13px, 3.5vw, 16px);
      color: #ffffff;
      text-align: center;
      line-height: 1.6;
      max-width: 420px;
      margin-bottom: 28px;
      font-weight: 600;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.6), -1px -1px 2px rgba(0,0,0,0.3);
    }

    .tagline em {
      color: #ff6b35;
      font-style: normal;
      font-weight: 700;
    }

    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      max-width: 280px;
      padding: 16px 28px;
      background: linear-gradient(135deg, #ff6b35 0%, #ff8a65 100%);
      color: #fff;
      font-size: 16px;
      font-weight: 800;
      border-radius: 50px;
      text-decoration: none;
      margin-bottom: 32px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.25);
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
      border: none;
      cursor: pointer;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.3);
    }
    .btn-primary:active {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    .btn-play-icon {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .btn-play-icon::after {
      content: "▶";
      font-size: 14px;
      color: white;
    }

    .links-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .links-row {
      display: flex;
      gap: 14px;
      justify-content: center;
    }

    .btn-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 18px;
      background: #2d2d2d;
      border: none;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      border-radius: 50px;
      text-decoration: none;
      transition: all 0.15s ease;
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
    }
    .btn-link:hover {
      background: #3a3a3a;
      transform: translateY(-2px);
    }
    .btn-link:active {
      transform: translateY(0);
    }

    .btn-link i, .btn-primary i {
      font-size: 17px;
    }

    footer {
      font-size: 11px;
      color: #ffffff;
      text-align: center;
      line-height: 1.6;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Emergent Emotional<br>Appraisal in Generative<br>Agents</h1>

    <p class="tagline">
      AI agents develop <em>fear, grief &amp; suspicion</em> from pure prediction &amp; zero hardcoded rules
    </p>

    <a href="/ghost_town/kiosk/demo_condition_d/" class="btn-primary">
      <i class="fa-solid fa-circle-play"></i>
      Watch Live Demo
    </a>

    <div class="links-stack">
      <div class="links-row">
        <a href="https://github.com/premxai/emotion_engine" class="btn-link" target="_blank" rel="noopener">
          <i class="fa-brands fa-github"></i> GitHub
        </a>
        <a href="https://huggingface.co/datasets/PremC1F/emotion-engine" class="btn-link" target="_blank" rel="noopener">
          <span style="font-size:17px">🤗</span> Dataset
        </a>
        <a href="/static/poster.pdf" class="btn-link" target="_blank">
          <i class="fa-regular fa-file-lines"></i> Paper
        </a>
      </div>
      <div class="links-row">
        <a href="https://www.linkedin.com/in/premxai" class="btn-link" target="_blank" rel="noopener">
          <i class="fa-brands fa-linkedin"></i> LinkedIn
        </a>
        <a href="https://x.com/premxai" class="btn-link" target="_blank" rel="noopener">
          <i class="fa-brands fa-x-twitter"></i> X
        </a>
      </div>
    </div>

    <footer>
      Prem Babu Kanaparthi
    </footer>
  </div>

</body>
</html>
