{% load staticfiles %}

<script type="text/javascript">
	/*
	  Main resources: 
	  https://www.youtube.com/watch?v=cKIG1lKwLeo&t=401s&ab_channel=HongLy
	  For the ground zero code, see the exported files from here: 
	  https://codepen.io/mikewesthad/pen/BVeoYP?editors=1111 

	  Also worth taking a look: 
	  https://www.youtube.com/watch?v=fdXcD9X4NrQ&ab_channel=MorganPage
	  and 
	  https://www.youtube.com/watch?v=MR2CvWxOEsw&ab_channel=MattWilber
	 */


	// ###########################################################################
	// PREAMBLE
	// ###########################################################################

	// <step> -- one full loop around all three phases determined by <phase> is 
	// a step. We use this to link the steps in the backend. 
	let step = {{step}};
	let sim_code = "{{sim_code}}";
 	let step_size = {{sec_per_step}} * 1000; // 10 seconds = 10000
  let worldConfig = {{ world_config_json|safe }};

	// Phaser 3.0 global settings. 
	// Configuration meant to be passed to the main Phaser game instance. 
	const config = {
	  type: Phaser.AUTO,
	  width: 1500,
	  height: 800,
	  parent: "game-container",
	  pixelArt: true,
	  physics: {
	    default: "arcade",
	    arcade: {
	      gravity: { y: 0 } } },
	  scene: {
	    preload: preload,
	    create: create,
	    update: update },
	  scale: {zoom: 0.8} };

	// const config = {
	//   type: Phaser.AUTO,
	//   width: 4480,
	//   height: 3200,
	//   parent: "game-container",
	//   pixelArt: true,
	//   physics: {
	//     default: "arcade",
	//     arcade: {
	//       gravity: { y: 0 } } },
	//   scene: {
	//     preload: preload,
	//     create: create,
	//     update: update },
	//   scale: {zoom: 1} };


	// Creating the game instance and setting up the main Phaser variables that
	// will be used in it.
	const game = new Phaser.Game(config);
	let cursors;
	let player;
	let mainCamera = null;      // set in create(), used by toggleFullMap()
	let fullMapMode = false;
	const FULL_MAP_ZOOM = 0.25; // shows entire 4480×3200 map in the 1500×800 canvas
	const NORMAL_ZOOM = 0.8;

	function toggleFullMap() {
	  if (!mainCamera) return;
	  fullMapMode = !fullMapMode;
	  if (fullMapMode) {
	    mainCamera.stopFollow();
	    mainCamera.setZoom(FULL_MAP_ZOOM);
	    // Centre on map centre
	    mainCamera.centerOn(2240, 1600);
	    document.getElementById('full-map-btn').textContent = 'Follow Agent';
	  } else {
	    mainCamera.setZoom(NORMAL_ZOOM);
	    if (player) mainCamera.startFollow(player);
	    document.getElementById('full-map-btn').textContent = 'Full Map';
	  }
	}

	// Persona related variables. This should have the name of the persona as its 
	// keys, and the instances of the Persona class as the values.
	let persona_names = {{ persona_init_pos|safe }};
	var spawn_tile_loc = {};
	for (var key in persona_names){
		spawn_tile_loc[key] = persona_names[key] ;
	}

	var personas = {};
	var pronunciatios = {};
	var speech_bubbles = {};
	var ghost_markers = {};
	let anims_direction;

	// ===== GHOST TOWN VISUALIZATION EXTENSIONS =====
	// Emotion HUD state
	var current_affect_state = {};   // {persona_name: affect_data} updated per step
	var emotion_hud_graphics = {};   // {persona_name: Phaser.GameObjects.Graphics}
	var storm_overlay = null;
	var danger_radius_gfx = null;
	var social_graph_gfx = null;
	var show_social_graph = false;
	var is_condition_d = false;
	var is_night_now = false;
	var ghosts_current = [];
	var prev_alive_state = {};
	var activeToasts = [];
	var nightOverlay = null;
	var ghostGlowGfx = null;
	var gt_scene = null;
	var total_steps = 0; // updated after all_movement is loaded below

	// Affect/event data (loaded asynchronously from full_replay.json)
	var affect_timeline = {};
	var event_log_data = [];
	var social_graph_timeline = {};

	// Emotion display config — labels and colors for standard and condition_d modes
	var EMOTION_LABELS_STANDARD = ["fear","stress","trust","grief","suspicion","relief"];
	var EMOTION_LABELS_D = ["ghost_p","nearby_death_p","help_p","shelter_p","storm_p","valence"];
	var EMOTION_COLORS = {
		"fear":0xff4444,"stress":0xff8800,"trust":0x44cc44,
		"grief":0x4488ff,"suspicion":0xaa44cc,"relief":0x44cccc,
		"ghost_p":0xff4444,"nearby_death_p":0x4488ff,"help_p":0x44cc44,
		"shelter_p":0x44cccc,"storm_p":0xff8800,"valence":0xffcc00
	};

	// Async load full_replay.json for rich emotion/event data
	if (worldConfig.supports_ghosts) {
		fetch('/ghost_town/full_replay/' + sim_code + '/')
			.then(function(r) { return r.ok ? r.json() : null; })
			.catch(function() { return null; })
			.then(function(data) {
				if (!data) return;
				affect_timeline = data.affect_timeline || {};
				event_log_data = data.events || [];
				social_graph_timeline = data.social_graph_timeline || {};
				is_condition_d = (data.condition === 'condition_d');
				total_steps = data.total_steps || total_steps;
			});
	}

	// Public controls (callable from HTML UI)
	function toggleSocialGraph() {
		show_social_graph = !show_social_graph;
		if (!show_social_graph && social_graph_gfx) social_graph_gfx.clear();
		var btn = document.getElementById("social-graph-btn");
		if (btn) btn.textContent = show_social_graph ? "Hide Social Graph" : "Show Social Graph";
	}
	function setReplaySpeed(mult) {
		var m = parseFloat(mult) || 1.0;
		execute_count_max = Math.max(16, Math.round(300 / m));
	}
	function jumpToStep(target) {
		step = Math.max(0, Math.min(parseInt(target), total_steps - 1));
		execute_count = execute_count_max + 1;
	}

	// Night darkness curve: maps 24h hour → overlay alpha
	function getNightAlpha(curr_time_str) {
		var m = (curr_time_str || "").match(/(\d+):00\s*(AM|PM)/i);
		if (!m) return 0;
		var h = parseInt(m[1]) % 12 + (m[2].toUpperCase() === 'PM' ? 12 : 0);
		var curve = {8:0,9:0,10:0,11:0,12:0,13:0,14:0,15:0,16:0,17:0,
		             18:0.15,19:0.28,20:0.40,21:0.52,22:0.52,23:0.52,
		             0:0.52,1:0.52,2:0.52,3:0.52,4:0.52,5:0.20,6:0.10,7:0.03};
		return curve[h] !== undefined ? curve[h] : 0;
	}

	// Floating toast notification
	function showToast(text, bgColor, wx, wy) {
		if (!gt_scene) return;
		var t = gt_scene.add.text(wx, wy, text, {
			fontSize: '13px', fontFamily: 'sans-serif',
			color: '#ffffff', backgroundColor: bgColor,
			padding: {x: 7, y: 4}
		}).setDepth(200).setOrigin(0.5, 1);
		activeToasts.push({obj: t, born: gt_scene.time.now, life: 2800, baseY: wy});
	}

	// Keyboard shortcuts (Space handled via play/pause buttons; Shift+Arrow for step jumps)
	document.addEventListener('keydown', function(e) {
		if (e.code === 'ArrowRight' && e.shiftKey) { jumpToStep(step + 1); e.preventDefault(); }
		else if (e.code === 'ArrowLeft' && e.shiftKey) { jumpToStep(step - 1); e.preventDefault(); }
	});
	let pre_anims_direction;
	let pre_anims_direction_dict = {};
	let initial_focus_tile = [0, 0];
	let persona_key_list = Object.keys(spawn_tile_loc);
	if (persona_key_list.length > 0) {
		initial_focus_tile = spawn_tile_loc[persona_key_list[0]];
	}

	// <tile_width> is the width of one individual tile (tiles are square)
	let tile_width = 32;
	// movement_speed: pixels moved per frame (must divide tile_width evenly for clean stops)
	// execute_count_max: frames per simulation step — controls real-time pacing
	// 1 sim-hour = 5 real seconds = 300 frames @ 60fps
	let movement_speed = 2;
	var execute_count_max = 300;
	var execute_count = execute_count_max;
	let movement_target = {};
	// Pre-populate movement_target from spawn positions so personas never have undefined targets
	for (var _k in spawn_tile_loc) {
		movement_target[_k] = [spawn_tile_loc[_k][0] * tile_width, spawn_tile_loc[_k][1] * tile_width];
	}
	let all_movement = {{ all_movement|safe }};
	total_steps = Object.keys(all_movement).length;

  let start_datetime =new Date(Date.parse("{{start_datetime}}"));
  var datetime_options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  if (worldConfig.supports_ghosts && all_movement[step] && all_movement[step]["meta"]) {
    document.getElementById("game-time-content").innerHTML = all_movement[step]["meta"]["curr_time"];
  } else {
 	  document.getElementById("game-time-content").innerHTML = start_datetime.toLocaleTimeString("en-US", datetime_options);
  }
 	

	// ###########################################################################
	// ENGINE
	// ###########################################################################

	// Joon: Phaser 3.0 is oriented around "scenes" -- recall how Pokemon plays: 
	//       there is the outdoor space, and then there is the indoor space; when
	//       you go inside, you transition to a new "scene" and the outdoor space
	//       basically disappears. 
	//       A scene in Phaser has four key methods that are called at different
	//       stages of rendering for different purposes. They are: 
	//       init() -> preload() -> create() -> update()
	//         init() is called only once at the very beginning. This is the 
	//           initialization function in case that is needed. 
	//         preload() is called once and preloads any of the assets
	//         create() is also called once after preloading... creates sprites 
	//           and actually displays stuff
	//         update() is called on each frame during the game play 

	function preload() {  
		// For managing cross origin errors. We need to set this, change AWS 
		// CORS settings, and django AWS settings. 
		this.load.crossOrigin = '';

	  // Loading the necessary images (e.g., the background image, character 
	  // sprites). 
	  // Joon: for load.image, the first parameter is simply the key value that
	  //       you are passing in. The second parameter should be pointed to the
	  //       png file that contains the tileset. 
	  //       Also IMPORTANT: when you create a tileset in Tiled, always be  
	  //       sure to check the "embedded" option. 
	  this.load.image("blocks_1", "{% static world_config.asset_root|add:'/visuals/map_assets/blocks/blocks_1.png' %}");
	  this.load.image("walls", "{% static world_config.asset_root|add:'/visuals/map_assets/v1/Room_Builder_32x32.png' %}");
	  this.load.image("interiors_pt1", "{% static world_config.asset_root|add:'/visuals/map_assets/v1/interiors_pt1.png' %}");
	  this.load.image("interiors_pt2", "{% static world_config.asset_root|add:'/visuals/map_assets/v1/interiors_pt2.png' %}");
	  this.load.image("interiors_pt3", "{% static world_config.asset_root|add:'/visuals/map_assets/v1/interiors_pt3.png' %}");
	  this.load.image("interiors_pt4", "{% static world_config.asset_root|add:'/visuals/map_assets/v1/interiors_pt4.png' %}");
	  this.load.image("interiors_pt5", "{% static world_config.asset_root|add:'/visuals/map_assets/v1/interiors_pt5.png' %}");
	  this.load.image("CuteRPG_Field_B", "{% static world_config.asset_root|add:'/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Field_B.png' %}");
	  this.load.image("CuteRPG_Field_C", "{% static world_config.asset_root|add:'/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Field_C.png' %}");
	  this.load.image("CuteRPG_Harbor_C", "{% static world_config.asset_root|add:'/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Harbor_C.png' %}");
	  this.load.image("CuteRPG_Village_B", "{% static world_config.asset_root|add:'/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Village_B.png' %}");
	  this.load.image("CuteRPG_Forest_B", "{% static world_config.asset_root|add:'/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Forest_B.png' %}");
	  this.load.image("CuteRPG_Desert_C", "{% static world_config.asset_root|add:'/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Desert_C.png' %}");
	  this.load.image("CuteRPG_Mountains_B", "{% static world_config.asset_root|add:'/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Mountains_B.png' %}");
	  this.load.image("CuteRPG_Desert_B", "{% static world_config.asset_root|add:'/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Desert_B.png' %}");
	  this.load.image("CuteRPG_Forest_C", "{% static world_config.asset_root|add:'/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Forest_C.png' %}");

	  // Joon: This is the export json file you get from Tiled. 
	  this.load.tilemapTiledJSON("map", "{% static world_config.tilemap_json %}");

	  // An atlas is a way to pack multiple images together into one texture. I'm 
	  // using it to load all the player animations (walking left, walking right, 
	  // etc.) in one image. For more info see:
	  // https://labs.phaser.io/view.html?src=src/animation/texture%20atlas%20animation.js
	  // If you don't use an atlas, you can do the same thing with a spritesheet, 
	  // see: https://labs.phaser.io/view.html?src=src/animation/single%20sprite%20sheet.js
	  // Joon: Technically, I think this guy had the best tutorial for atlas: 
	  //       https://www.youtube.com/watch?v=fdXcD9X4NrQ&ab_channel=MorganPage
	  this.load.atlas("atlas", "{% static 'assets/characters/Yuriko_Yamamoto.png' %}", 
	  												     "{% static 'assets/characters/atlas.json' %}");

	  {% for p in persona_names %}
		  {% with 'assets/characters/'|add:p.sprite_underscore|add:'.png' as image_static %}
			  this.load.atlas("{{p.underscore}}", "{% static image_static %}", 
		  										  		     "{% static 'assets/characters/atlas.json' %}");
			{% endwith %}
	  {% endfor %}

	  this.load.image('speech_bubble', "{% static 'assets/speech_bubble/v3.png' %}");
	}

	function create() {  
	  const map = this.make.tilemap({ key: "map" });
	  // Joon: Logging map is really helpful for debugging here: 
	  //       console.log(map);

	  // The first parameter is the name you gave to the tileset in Tiled and then
	  // the key of the tileset image in Phaser's cache (i.e. the name you used in
	  // preload)
	  // Joon: for the first parameter here, really take a look at the 
	  //       console.log(map) output. You need to make sure that the name 
	  //       matches.
	  const collisions = map.addTilesetImage("blocks", "blocks_1");
	  const walls = map.addTilesetImage("Room_Builder_32x32", "walls");
	  const interiors_pt1 = map.addTilesetImage("interiors_pt1", "interiors_pt1");
	  const interiors_pt2 = map.addTilesetImage("interiors_pt2", "interiors_pt2");
	  const interiors_pt3 = map.addTilesetImage("interiors_pt3", "interiors_pt3");
	  const interiors_pt4 = map.addTilesetImage("interiors_pt4", "interiors_pt4");
	  const interiors_pt5 = map.addTilesetImage("interiors_pt5", "interiors_pt5");
	  const CuteRPG_Field_B = map.addTilesetImage("CuteRPG_Field_B", "CuteRPG_Field_B");
	  const CuteRPG_Field_C = map.addTilesetImage("CuteRPG_Field_C", "CuteRPG_Field_C");
	  const CuteRPG_Harbor_C = map.addTilesetImage("CuteRPG_Harbor_C", "CuteRPG_Harbor_C");
	  const CuteRPG_Village_B = map.addTilesetImage("CuteRPG_Village_B", "CuteRPG_Village_B");
	  const CuteRPG_Forest_B = map.addTilesetImage("CuteRPG_Forest_B", "CuteRPG_Forest_B");
	  const CuteRPG_Desert_C = map.addTilesetImage("CuteRPG_Desert_C", "CuteRPG_Desert_C");
	  const CuteRPG_Mountains_B = map.addTilesetImage("CuteRPG_Mountains_B", "CuteRPG_Mountains_B");
	  const CuteRPG_Desert_B = map.addTilesetImage("CuteRPG_Desert_B", "CuteRPG_Desert_B");
	  const CuteRPG_Forest_C = map.addTilesetImage("CuteRPG_Forest_C", "CuteRPG_Forest_C");

	  // The first parameter is the layer name (or index) taken from Tiled, the 
	  // second parameter is the tileset you set above, and the final two 
	  // parameters are the x, y coordinate. 
	  // Joon: The "layer name" that comes as the first parameter value  
	  //       literally is taken from our Tiled layer name. So to find out what
	  //       they are; you actually need to open up tiled and see how you 
	  //       named things there. 
	  let tileset_group_1 = [CuteRPG_Field_B, CuteRPG_Field_C, CuteRPG_Harbor_C, CuteRPG_Village_B, 
	  											 CuteRPG_Forest_B, CuteRPG_Desert_C, CuteRPG_Mountains_B, CuteRPG_Desert_B, CuteRPG_Forest_C,
	  											 interiors_pt1, interiors_pt2, interiors_pt3, interiors_pt4, interiors_pt5, walls];
	  const bottomGroundLayer = map.createLayer("Bottom Ground", tileset_group_1, 0, 0);
	  const exteriorGroundLayer = map.createLayer("Exterior Ground", tileset_group_1, 0, 0);
	  const exteriorDecorationL1Layer = map.createLayer("Exterior Decoration L1", tileset_group_1, 0, 0);
	  const exteriorDecorationL2Layer = map.createLayer("Exterior Decoration L2", tileset_group_1, 0, 0);
	  const interiorGroundLayer = map.createLayer("Interior Ground", tileset_group_1, 0, 0);
	  const wallLayer = map.createLayer("Wall", [CuteRPG_Field_C, walls], 0, 0);
	  const interiorFurnitureL1Layer = map.createLayer("Interior Furniture L1", tileset_group_1, 0, 0);
	  const interiorFurnitureL2Layer = map.createLayer("Interior Furniture L2", tileset_group_1, 0, 0);
	  const foregroundL1Layer = map.createLayer("Foreground L1", tileset_group_1, 0, 0);
	  const foregroundL2Layer = map.createLayer("Foreground L2", tileset_group_1, 0, 0);

	  const collisionsLayer = map.createLayer("Collisions", collisions, 0, 0);
	  // const groundLayer = map.createLayer("Ground", walls, 0, 0);
	  // const indoorGroundLayer = map.createLayer("Indoor Ground", walls, 0, 0);
	  // const wallsLayer = map.createLayer("Walls", walls, 0, 0);
	  // const interiorsLayer = map.createLayer("Furnitures", interiors, 0, 0);
	  // const builtInLayer = map.createLayer("Built-ins", interiors, 0, 0);
	  // const appliancesLayer = map.createLayer("Appliances", interiors, 0, 0);
	  // const foregroundLayer = map.createLayer("Foreground", interiors, 0, 0);

	  // Joon : This is where you want to create a custom field for the tileset
	  //        in Tiled. Take a look at this guy's tutorial: 
	  //        https://www.youtube.com/watch?v=MR2CvWxOEsw&ab_channel=MattWilber
	  collisionsLayer.setCollisionByProperty({ collide: true });
	  // By default, everything gets depth sorted on the screen in the order we 
	  // created things. Here, we want the "Above Player" layer to sit on top of 
	  // the player, so we explicitly give it a depth. Higher depths will sit on 
	  // top of lower depth objects.
	  // Collisions layer should get a negative depth since we do not want to see
	  // it. 
	  collisionsLayer.setDepth(-1);
	  foregroundL1Layer.setDepth(2);
	  foregroundL2Layer.setDepth(2);

	  // *** SET UP CAMERA *** 
	  // "player" is to be set as the center of mass for our "camera." We 
	  // basically create a game character sprite as we would for our personas 
	  // but we move it to depth -1 and let it pass through the collision map;  
	  // that is, do not have the following line: 
	  // this.physics.add.collider(player, collisionsLayer);
	  // OLD NOTE: Create a sprite with physics enabled via the physics system. 
	  // The image  used for the sprite has a bit of whitespace, so I'm using 
	  // setSize & setOffset to control the size of the player's body.
	  player = this.physics.add.
	                sprite(initial_focus_tile[0] * tile_width + tile_width / 2,
	                       initial_focus_tile[1] * tile_width + tile_width,
	                       "atlas",
	                       "down").
	                setSize(30, 40).
	                setOffset(0, 0);
	  player.setDepth(-1);
	  // Setting up the camera.
	  const camera = this.cameras.main;
	  mainCamera = camera;
	  camera.startFollow(player);
	  camera.setBounds(0, 0, map.widthInPixels, map.heightInPixels);
	  cursors = this.input.keyboard.createCursorKeys();

	  // *** SET UP PERSONAS *** 
	  // We start by creating the game sprite objects. 
	  for (let i=0; i<Object.keys(spawn_tile_loc).length; i++) { 
	    let persona_name = Object.keys(spawn_tile_loc)[i];
	    let start_pos = [spawn_tile_loc[persona_name][0] * tile_width + tile_width / 2, 
	                     spawn_tile_loc[persona_name][1] * tile_width + tile_width];
	    let new_sprite = this.physics.add
	                         .sprite(start_pos[0], start_pos[1], persona_name, "down")
	                         .setSize(30, 40)
	                         .setOffset(0, 0);
	    // Scale up the sprite
      new_sprite.displayWidth = 40;
      new_sprite.scaleY = new_sprite.scaleX;

	    // Here, we are creating the persona and its pronunciatio sprites.
	    personas[persona_name] = new_sprite;
	    speech_bubbles[persona_name] = this.add.image(new_sprite.body.x - 0, 
	    																						  new_sprite.body.y - 30,
	    																						  'speech_bubble').setDepth(3);
      speech_bubbles[persona_name].displayWidth = 130;
      speech_bubbles[persona_name].displayHeight = 58;

	    pronunciatios[persona_name] = this.add.text(
	                                   new_sprite.body.x - 6, 
	                                   new_sprite.body.y - 42, 
	                                   "🦁", {
	                                   font: "24px monospace", 
	                                   fill: "#000000", 
	                                   padding: { x: 8, y: 8}, 
	                                   border:"solid",
	                                   borderRadius:"10px"}).setDepth(3);
	  }

	  if (worldConfig.supports_ghosts) {
	  	if (document.getElementById("world-status-content") != null && all_movement[step] && all_movement[step]["meta"]) {
	  		document.getElementById("world-status-content").innerHTML = buildWorldStatus(all_movement[step]["meta"]);
	  	}

	  	// Emotion HUD — one Graphics object per persona (drawn above sprites)
	  	for (var pname in spawn_tile_loc) {
	  		emotion_hud_graphics[pname] = this.add.graphics().setDepth(5);
	  	}

	  	// Full-screen storm overlay (camera-space rectangle)
	  	storm_overlay = this.add.rectangle(0, 0, 2000, 1200, 0x000022, 0)
	  		.setScrollFactor(0).setDepth(1).setOrigin(0, 0);

	  	// Danger radius circles around ghosts
	  	danger_radius_gfx = this.add.graphics().setDepth(3);

	  	// Social graph tie lines
	  	social_graph_gfx = this.add.graphics().setDepth(1);

	  	// Night darkness overlay (camera-fixed, semi-transparent dark blue)
	  	nightOverlay = this.add.rectangle(0, 0, 2000, 1200, 0x000033, 0)
	  		.setScrollFactor(0).setDepth(1.5).setOrigin(0, 0);

	  	// Per-frame ghost glow graphics
	  	ghostGlowGfx = this.add.graphics().setDepth(3);

	  	// Store scene reference for showToast

	  // Create the player's walking animations from the texture atlas. These are

	function update(time, delta) {
		// *** SETUP PLAY AND PAUSE BUTTON *** 
		let play_context = this;

			play_context.scene.resume();
		}  
		play_button.onclick = function(){
			game_resume();
		};
		function game_pause() {  
			play_context.scene.pause();
		}  
		pause_button.onclick = function(){
			game_pause();
		};

	  // *** MOVE CAMERA *** 
	  // This is where we finish up the camera setting we started in the create() 
	  // function. We set the movement speed of the camera and wire up the keys to
	  // map to the actual movement.
	  const camera_speed = 400;
	  // Stop any previous movement from the last frame
	  player.body.setVelocity(0);
	  if (cursors.left.isDown) {
	    player.body.setVelocityX(-camera_speed);
	  } 
	  if (cursors.right.isDown) {
	    player.body.setVelocityX(camera_speed);
	  } 
	  if (cursors.up.isDown) {
	    player.body.setVelocityY(-camera_speed);
	  } 
	  if (cursors.down.isDown) {
	    player.body.setVelocityY(camera_speed);
	  }

	  
	  // Toast fade + float (every frame)
	  for (var _ti = activeToasts.length - 1; _ti >= 0; _ti--) {
	  	var _toast = activeToasts[_ti];
	  	var _age = time - _toast.born;
	  	if (_age > _toast.life) { _toast.obj.destroy(); activeToasts.splice(_ti, 1); continue; }
	  	_toast.obj.setAlpha(Math.max(0, 1 - _age / _toast.life));
	  	_toast.obj.y = _toast.baseY - (_age / _toast.life) * 30;
	  }

	  let curr_focused_persona = document.getElementById("temp_focus").textContent;
	  if (curr_focused_persona != "") {
	  	player.body.x = personas[curr_focused_persona].body.x;
	  	player.body.y = personas[curr_focused_persona].body.y;

	  }



	  // *** MOVING PERSONAS ***
	  if (!all_movement[step]) return;
	 	for (let i=0; i<Object.keys(personas).length; i++) {

    	let curr_persona = personas[curr_persona_name];
    	let curr_pronunciatio = pronunciatios[Object.keys(personas)[i]];

      let curr_payload = all_movement[step][curr_persona_name.replace(/_/g, " ")] || null;

    	if (curr_persona_name.replace(/_/g, " ") in all_movement[step]) {
    		if (execute_count == execute_count_max) { 
    			let curr_x = curr_payload["movement"][0]
	        let curr_y = curr_payload["movement"][1]
    			movement_target[curr_persona_name] = [curr_x * tile_width, 
	                                              curr_y * tile_width]; 
	        let pronunciatio_content = curr_payload["pronunciatio"];
	        let description_content = curr_payload["description"];
	        let chat_content_raw = curr_payload["chat"];

	        let chat_content = "";
	        if (chat_content_raw != null ){
		        for (let j=0; j<chat_content_raw.length; j++) { 
		        	chat_content += chat_content_raw[j][0] + ": " + chat_content_raw[j][1] + "<br>"
		        }
		      } else {

	        	                  "routine":"🚶","help":"🤝","rest":"💤","work":"⚒️","mourn":"😢",
	        	                  "seek_hospital":"🏥","gather":"🎒","hide":"🙈"};

	        	var g_emoji = goal_emoji[g] || "🚶";

    		}

    		if (execute_count > 0) {

	          curr_persona.body.x += movement_speed; 
	          anims_direction = "r";
	          pre_anims_direction = "r"

	        } else if (curr_persona.body.x > movement_target[curr_persona_name][0]) {

	          pre_anims_direction = "l"
	          pre_anims_direction_dict[curr_persona_name] = "l"
	        } else if (curr_persona.body.y < movement_target[curr_persona_name][1]) {
	          curr_persona.body.y += movement_speed;
	          anims_direction = "d";
	          pre_anims_direction = "d"
	          pre_anims_direction_dict[curr_persona_name] = "d"
	        } else if (curr_persona.body.y > movement_target[curr_persona_name][1]) {
	          curr_persona.body.y -= movement_speed;
	          anims_direction = "u";
	          pre_anims_direction = "u"
	          pre_anims_direction_dict[curr_persona_name] = "u"
	        } else {
	        	anims_direction = "";
	        }

	        curr_pronunciatio.x = curr_persona.body.x + 18;
          curr_pronunciatio.y = curr_persona.body.y - 42 - 25; // DEBUG 1 --- I added 32 offset on Dec 29.
          curr_speech_bubble.x = curr_persona.body.x + 80;
          curr_speech_bubble.y = curr_persona.body.y - 39;

          // Update emotion HUD bars (every movement frame to follow sprite)
          if (worldConfig.supports_ghosts && emotion_hud_graphics[curr_persona_name]) {

          }

          let left_walk_name = curr_persona_name + "-left-walk";
					let right_walk_name = curr_persona_name + "-right-walk";
					let down_walk_name = curr_persona_name + "-down-walk";
					let up_walk_name = curr_persona_name + "-up-walk";
          if (anims_direction == "l") {

	      // If we were moving, pick an idle frame to use

	  // === GHOST GLOW + AGENT WARNING RINGS (every frame) ===

	  if (execute_count == 0) {
		  for (let i=0; i<Object.keys(personas).length; i++) {

	// Control button binders
	var play_button=document.getElementById("play_button");
	var pause_button=document.getElementById("pause_button");

	function updatePersonaState(sprite, payload) {
		if (payload["alive"]) {
			sprite.setAlpha(1);
			let stress = payload["stress"] || 0;
			let fear = payload["fear"] || 0;
			if (stress >= 40 || fear >= 45) {
				sprite.setTint(0xff6b6b);
			} else if (stress >= 15 || fear >= 20) {
				sprite.setTint(0xffd166);
			} else {
				sprite.clearTint();
			}
		} else {
			sprite.setTint(0x777777);
			sprite.setAlpha(0.55);
		}
	}

	function syncGhostMarkers(scene, ghosts) {
		let liveGhostIds = {};
		for (let i = 0; i < ghosts.length; i++) {
			let ghostId = ghosts[i]["ghost_id"];
			liveGhostIds[ghostId] = true;
			if (!(ghostId in ghost_markers)) {
				ghost_markers[ghostId] = scene.add.text(0, 0, "👻", {
					font: "22px monospace",
					padding: { x: 2, y: 2 }
				}).setDepth(4);
			}
			ghost_markers[ghostId].x = ghosts[i]["location"][0] * tile_width + 8;
			ghost_markers[ghostId].y = ghosts[i]["location"][1] * tile_width - 2;
			ghost_markers[ghostId].setVisible(true);
		}

		for (const ghostId in ghost_markers) {
			if (!(ghostId in liveGhostIds)) {
				ghost_markers[ghostId].setVisible(false);
			}
		}
	}

	function buildWorldStatus(meta) {
		return "Weather: " + meta["weather"] + " | Ghosts: " + meta["ghost_count"] + " | Storm Severity: " + meta["storm_severity"];
	}


	// ===== EMOTION HUD =====
	// Draws 6 mini-bars above each sprite representing affect dimensions.
	// In condition_d mode shows prediction probabilities with different labels.
	function drawEmotionHUD(gfx, sprite, affect_data, payload, cond_d) {
		if (!gfx) return;
		gfx.clear();
		if (!sprite) return;
		// Grey out if dead
		if (payload && payload["alive"] === false) {
			gfx.fillStyle(0x555555, 0.5);
			gfx.fillRect(Math.round(sprite.body.x), Math.round(sprite.body.y - 28), 40, 6);
			return;
		}

		var labels = cond_d ? EMOTION_LABELS_D : EMOTION_LABELS_STANDARD;
		var bar_w = 5;
		var bar_gap = 2;
		var bar_max_h = 18;
		var total_w = labels.length * (bar_w + bar_gap) - bar_gap;
		var base_x = Math.round(sprite.body.x + sprite.displayWidth / 2 - total_w / 2);
		var base_y = Math.round(sprite.body.y - 50);

		// Semi-transparent background
		gfx.fillStyle(0x000000, 0.45);
		gfx.fillRect(base_x - 2, base_y - 2, total_w + 4, bar_max_h + 4);

		// Affect vector may be nested under affect_vector key or flat
		var av = (affect_data && affect_data["affect_vector"]) ? affect_data["affect_vector"] : affect_data;

		for (var i = 0; i < labels.length; i++) {
			var key = labels[i];
			var raw_val = av ? av[key] : null;
			var val = Math.max(0, Math.min(1, parseFloat(raw_val) || 0));
			var h = Math.max(1, Math.round(val * bar_max_h));
			var color = EMOTION_COLORS[key] || 0xcccccc;
			var bx = base_x + i * (bar_w + bar_gap);
			// Background trough
			gfx.fillStyle(0x333333, 0.7);
			gfx.fillRect(bx, base_y, bar_w, bar_max_h);
			// Filled bar
			gfx.fillStyle(color, 0.9);
			gfx.fillRect(bx, base_y + bar_max_h - h, bar_w, h);
		}
	}


	// ===== SOCIAL GRAPH =====
	// Draws tie lines between nearby agents based on social_graph_timeline data.
	function drawSocialGraph(gfx, step) {
		gfx.clear();
		var edges = social_graph_timeline && (social_graph_timeline[step] || social_graph_timeline[String(step)]);
		if (!edges || !Array.isArray(edges)) return;

		for (var i = 0; i < edges.length; i++) {
			var edge = edges[i];
			var src = (edge.source || edge.src || "").replace(/ /g, "_");
			var tgt = (edge.target || edge.tgt || "").replace(/ /g, "_");
			if (!personas[src] || !personas[tgt]) continue;

			var weight = parseFloat(edge.weight || 0);
			var label = edge.label || "";
			var sx = personas[src].body.x + 16;
			var sy = personas[src].body.y + 16;
			var tx = personas[tgt].body.x + 16;
			var ty = personas[tgt].body.y + 16;

			// Only draw if within 12 tiles
			var dist = Math.sqrt((sx - tx) * (sx - tx) + (sy - ty) * (sy - ty));
			if (dist > 12 * tile_width) continue;

			if (label === "rivals" || label === "strained" || weight < 0.2) {
				gfx.lineStyle(1, 0xff4444, 0.6);
			} else if (weight > 0.6) {
				gfx.lineStyle(2, 0x44cc44, 0.7);
			} else {
				gfx.lineStyle(1, 0x888888, 0.35);
			}
			gfx.beginPath();
			gfx.moveTo(sx, sy);
			gfx.lineTo(tx, ty);
			gfx.strokePath();
		}
	}


	// ===== EVENT LOG SIDEBAR =====
	function updateEventLog(step) {
		var log_el = document.getElementById("ghost-event-log");
		if (!log_el) return;

		var TYPE_ICONS = {
			"death": "💀", "ghost_attack": "👻", "help": "🤝",
			"share": "🤝", "share_supplies": "🤝", "refusal": "🙅",
			"storm": "⛈", "ghost_sighting": "👁", "shelter": "🏠",
			"supply_found": "🎒", "rescue": "🚑"
		};

		var shown = [];
		for (var s = Math.max(0, step - 4); s <= step; s++) {
			var evts = null;
			if (Array.isArray(event_log_data)) {
				evts = event_log_data.filter(function(e) { return parseInt(e.step || 0) === s; });
			} else {
				evts = event_log_data[s] || event_log_data[String(s)];
			}
			if (evts && evts.length) {
				for (var j = 0; j < evts.length; j++) shown.push({s: s, e: evts[j]});
			}
		}
		shown = shown.slice(-5).reverse();

		var html = "";
		for (var k = 0; k < shown.length; k++) {
			var entry = shown[k];
			var ev = entry.e;
			var icon = TYPE_ICONS[ev.event_type] || "📋";
			var desc = (ev.description || (ev.event_type || "event")).substring(0, 58);
			var color = ev.event_type === "death" ? "#ff6b6b"
			          : ev.event_type === "ghost_attack" ? "#ff9944" : "#cccccc";
			html += '<div style="font-size:11px;color:' + color
			      + ';border-bottom:1px solid #333;padding:2px 0;">'
			      + '<span style="color:#888">[' + entry.s + ']</span> ' + icon + ' ' + desc
			      + '</div>';
		}
		if (!html) html = '<div style="font-size:11px;color:#666;font-style:italic">No events</div>';
		log_el.innerHTML = html;
	}


	// ===== STEP COUNTER + SCRUB BAR =====
	function updateStepDisplay(current_step, total) {
		var el = document.getElementById("ghost-step-counter");
		if (el) el.textContent = "Step " + current_step + " / " + total;
		var bar = document.getElementById("ghost-scrub-bar");
		if (bar) {
			bar.max = total;
			bar.value = current_step;
		}
	}
</script>
